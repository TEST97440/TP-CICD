<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon TP Docker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 60px 80px;
      text-align: center;
      max-width: 600px;
    }

    .badge {
      display: inline-block;
      background: #2a2a4a;
      color: #7c7cff;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      color: #ffffff;
    }

    h1 span {
      color: #7c7cff;
    }

    p {
      font-size: 1.1rem;
      color: #9090aa;
      margin-bottom: 40px;
    }

    .tags {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .tag {
      background: #2a2a4a;
      color: #7c7cff;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">TP CI/CD</div>
    <h1>Bienvenue <span>azote</span> !</h1>
    <p>Merci de zote passage sur mon page web.</p>
    <div class="tags">
      <div class="tag">ASRC-10</div>
    </div>
  </div>
</body>
</html>
